services:
  - type: web
    name: offer-catcher-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    region: singapore          # 亚太区，中国访问延迟相对最低

    envVars:
      # sync: false = 值不写入代码仓库，必须在 Render 控制台手动填写
      - key: LLM_API_KEY
        sync: false
      # 以下几项非敏感，直接写入配置
      - key: LLM_BASE_URL
        value: https://api.deepseek.com/v1
      - key: LLM_MODEL
        value: deepseek-chat
      # Vision model for image (JPG/PNG) OCR — uses DeepSeek OpenAI-compatible API.
      # deepseek-chat supports base64 image_url input; same key/URL as main LLM.
      # Set VISION_API_KEY in Render console if using a separate DeepSeek key;
      # otherwise leave unset and it falls back to LLM_API_KEY automatically.
      # deepseek-chat is text-only and does not support image input.
      # Set to a vision-capable model (e.g. gpt-4o-mini) when one is available.
      - key: VISION_MODEL
        value: ""
      - key: VISION_API_KEY
        sync: false
      - key: VISION_BASE_URL
        value: https://api.deepseek.com/v1
